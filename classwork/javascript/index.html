<!DOCTYPE html>
<html>
    <head>
        <title></title>
        <link rel="stylesheet" href="main.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <button onclick="openMenu()">Click me...</button>
        <button onclick="glow()">Glow</button>
        <div class="menu active">
            Hello World!
        </div>

        <div class="gear"></div>

        <script>
            var menu = document.querySelector(".menu");
            // setting this allows us to not have to copy and paste it below in the functions because it sets a variable that is already recognized
            var gear = document.querySelector(".gear");

            function openMenu() {
                console.log('it works!');
                menu.classList.toggle("active");
                // now this just says menu instead of document.querySelector
                gear.classList.toggle("spin");
            }
            function glow() {
                document.querySelector(".menu").classList.toggle("glow");
                document.querySelector(".gear").classList.toggle("glow");
                document.body.classList.toggle("dark");
                // changes body background to be darker on glow mode
            }
        </script>
    </body>
</html>
